name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            gdext_lib: libgodot_mcp_gdext.so
          - os: macos-latest
            gdext_lib: libgodot_mcp_gdext.dylib
          - os: windows-latest
            gdext_lib: godot_mcp_gdext.dll

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache godot-cpp
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: godot-cpp-${{ runner.os }}-10.0.0-rc1

      - name: Configure CMake
        run: cmake -B build -S . -DRELEASE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Upload GDExtension library
        uses: actions/upload-artifact@v4
        with:
          name: gdext-${{ matrix.os }}
          path: build/${{ matrix.gdext_lib }}

  package:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download GDExtension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gdext-*
          path: libs

      - name: Assemble addons.zip
        run: |
          mkdir -p godot/addons/godot_mcp/bin
          cp libs/gdext-windows-latest/godot_mcp_gdext.dll godot/addons/godot_mcp/bin/
          cp libs/gdext-ubuntu-latest/libgodot_mcp_gdext.so godot/addons/godot_mcp/bin/
          cp libs/gdext-macos-latest/libgodot_mcp_gdext.dylib godot/addons/godot_mcp/bin/
          cd godot/addons
          zip -r ../../addons.zip godot_mcp/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: addons.zip
