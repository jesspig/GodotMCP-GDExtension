name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-2022

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache godot-cpp sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: godot-cpp-${{ runner.os }}-10.0.0-rc1-v1

      - name: Build
        run: python main.py build --release --no-zip

      - name: Upload GDExtension library
        uses: actions/upload-artifact@v4
        with:
          name: gdext-${{ runner.os }}
          path: example/addons/godot_mcp/bin/
          if-no-files-found: error

  package:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Download GDExtension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gdext-*
          path: dist

      - name: Package addons.zip
        run: python main.py package --libs-dir dist --recursive

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: addons.zip
