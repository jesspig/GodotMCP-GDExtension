name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gdext_lib: libgodot_mcp_gdext.so
          - os: macos-latest
            gdext_lib: libgodot_mcp_gdext.dylib
          - os: windows-2022
            gdext_lib: godot_mcp_gdext.dll

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache godot-cpp sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: godot-cpp-${{ runner.os }}-10.0.0-rc1-v1

      - name: Configure CMake
        run: >
          cmake -B build -S . -G Ninja -DRELEASE=ON
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release

      - name: Upload GDExtension library
        uses: actions/upload-artifact@v4
        with:
          name: gdext-${{ matrix.os }}
          path: build/${{ matrix.gdext_lib }}

  package:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate config files
        run: cmake -B build -S . -G Ninja

      - name: Download GDExtension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gdext-*
          path: libs

      - name: Assemble addons.zip
        run: |
          mkdir -p godot/addons/godot_mcp/bin
          cp libs/gdext-windows-2022/godot_mcp_gdext.dll godot/addons/godot_mcp/bin/
          cp libs/gdext-ubuntu-latest/libgodot_mcp_gdext.so godot/addons/godot_mcp/bin/
          cp libs/gdext-macos-latest/libgodot_mcp_gdext.dylib godot/addons/godot_mcp/bin/
          cp build/example/addons/godot_mcp/plugin.cfg godot/addons/godot_mcp/
          cp build/example/addons/godot_mcp/godot_mcp.gdextension godot/addons/godot_mcp/
          cd godot/addons
          zip -r ../../addons.zip godot_mcp/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: addons.zip
