name: workspace_remaining_smoke
description: Smoke tests for remaining workspace tools (viewport capture, stack trace, locals, debugger control, breakpoints)
headless: false

pipeline:
  on_failure: fail_fast
  before_all:
    - tool: new_scene
      args:
        root_type: "Node2D"
        root_name: "WorkspaceTestRoot"
    - tool: add_node
      args:
        class_name: "Sprite2D"
        node_name: "TestSprite"
        parent_path: ""
  after_all:
    - tool: new_scene
      args:
        root_type: "Node"
        root_name: "Cleanup"
  stages:
    - id: main
      steps:
        - id: capture_viewport
          tool: capture_viewport
          description: Captures editor viewport screenshot
          expect:
            has_keys: [file_path, format]

        - id: get_stack_trace
          tool: get_stack_trace
          description: Gets current stack trace from debugger (fails when no debugger active)
          expect:
            status: error
            error_contains: "NO_ACTIVE_DEBUGGER"

        - id: get_locals
          tool: get_locals
          description: Gets local variables (succeeds with empty locals when no debugger)
          expect:
            has_keys: [breaked, frame, locals]

        - id: debugger_control
          tool: debugger_control
          description: Breaks into debugger
          args:
            action: "break"
          expect:
            has_keys: [action, performed]

        - id: list_breakpoints
          tool: list_breakpoints
          description: Lists all breakpoints
          expect:
            has_keys: [breakpoints, count]

        - id: set_breakpoint
          tool: set_breakpoint
          description: Sets a breakpoint on a test script
          args:
            script_path: "res://test.gd"
            line: 1
          expect:
            status: success

        - id: remove_breakpoint
          tool: remove_breakpoint
          description: Removes the breakpoint from test script
          args:
            script_path: "res://test.gd"
            line: 1
          expect:
            status: success
