name: property_2d
description: 2D-specific property tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child2D, node_type: Node2D }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child3D, node_type: Node3D }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: get_node_position
    description: Get position of Node2D
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      has_keys: [node_path, x, y]
      field_checks:
        - key: node_path
          not_empty: true

  - tool: get_node_position
    description: Get position of non-2D node still returns position
    args: { node_path: "TestRoot/Child3D" }
    expect:
      status: success
      has_keys: [node_path, x, y]

  - tool: set_node_position
    description: Set 2D position
    args: { node_path: "TestRoot/Child2D", x: 50, y: 100 }
    expect:
      status: success
      has_keys: [node_path]

  - tool: batch_set_property
    description: Set property on multiple nodes at once
    args: { node_paths: ["TestRoot/Child2D"], property: "position", value: { x: 10, y: 20 } }
    expect:
      status: success
      has_keys: [results]

  - tool: batch_set_property
    description: Batch set with nonexistent node
    args: { node_paths: ["TestRoot/Nonexistent"], property: "position", value: { x: 0, y: 0 } }
    expect:
      status: success
      has_keys: [results]
