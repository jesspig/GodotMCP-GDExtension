name: project_scaffold_smoke
description: Smoke tests for create_project and export_project tools
headless: true

pipeline:
  on_failure: fail_fast
  after_all:
    - tool: delete_file
      args:
        path: "res://test_mcp_newproj"
        recursive: true
  stages:
    - id: main
      steps:
        - id: create_project
          tool: create_project
          description: Creates a new Godot project
          args:
            project_path: "res://test_mcp_newproj"
            project_name: "TestProject"
          expect:
            has_keys: [project_path, project_name, files_created]

        - id: export_project
          tool: export_project
          description: Exports with HTML5 preset (succeeds if preset exists)
          args:
            preset_name: "HTML5"
          expect:
            has_keys: [exported, preset_name]
