name: meta_tools_smoke
description: Smoke tests for all meta discovery tools
headless: true

pipeline:
  on_failure: fail_fast
  stages:
    - id: main
      steps:
        - id: get_info
          tool: get_info
          description: Returns editor and plugin runtime info
          expect:
            has_keys: [connection, engine, plugin, project, editor]
            field_checks:
              - key: connection.status
                value: "ok"
              - key: engine.version
                not_empty: true
              - key: plugin.builtin_tools
                not_empty: true

        - id: get_info_with_configs
          tool: get_info
          description: Returns info with client configs
          args:
            include_configs: true
          expect:
            has_keys: [connection, engine, plugin, project, editor, client_configs]
            field_checks:
              - key: client_configs.claude_code
                not_empty: true
              - key: client_configs.cursor
                not_empty: true

        - id: get_categories
          tool: get_categories
          description: Returns category tree
          expect:
            has_keys: [categories]
            field_checks:
              - key: categories
                not_empty: true

        - id: get_tools
          tool: get_tools
          description: Lists all registered tools
          expect:
            has_keys: [tools, count]
            field_checks:
              - key: count
                not_empty: true

        - id: get_tool_detail
          tool: get_tools
          description: Gets full detail for get_info via name
          args:
            name: "get_info"
          expect:
            has_keys: [id, name, description, parameters, required, category_path]
            field_checks:
              - key: id
                value: "get_info"

        - id: find_tool
          tool: find_tool
          description: Searches for get_info tool
          args:
            query: "get_info"
          expect:
            has_keys: [query, results, count]
            field_checks:
              - key: query
                value: "get_info"
              - key: count
                not_empty: true

        - id: call_tool
          tool: call_tool
          description: Calls get_info via call_tool fallback
          args:
            tool_name: "get_info"
          expect:
            has_keys: [connection, engine, plugin, project]
            field_checks:
              - key: connection.status
                value: "ok"
