name: search_tool
description: Search/find tools (find_in_file, search_project, find_and_replace)

tests:
  - tool: find_in_file
    description: Find text literal in project.godot
    args: { path: res://project.godot, pattern: "config/name", literal: true }
    expect:
      status: success
      has_keys: [path, matches, count]
      field_checks:
        - key: path
          value: res://project.godot
        - key: matches
          type: list
        - key: count
          type: int

  - tool: find_in_file
    description: Find text nonexistent in file
    args: { path: res://project.godot, pattern: "XYZZYX_NONEXISTENT", literal: true }
    expect:
      status: success
      field_checks:
        - key: count
          type: int
          value: 0

  - tool: find_in_file
    description: Nonexistent path returns error
    args: { path: res://nonexistent_xyz.godot, pattern: test, literal: true }
    expect:
      status: error
      has_keys: [error]

  - tool: search_project
    description: Search project for literal
    args: { pattern: "extends", literal: true, max_matches: 10 }
    expect:
      status: success
      has_keys: [matches, count, files_scanned]
      field_checks:
        - key: matches
          type: list
        - key: count
          type: int

  - tool: search_project
    description: Search project with regex
    args: { pattern: "extends\\s+Node", literal: false, max_matches: 5 }
    expect:
      status: success
      field_checks:
        - key: matches
          type: list

  - tool: search_project
    description: Search non-resource files (.txt not in default exts)
    args: { pattern: "test", extensions: ["txt"], max_matches: 5 }
    expect:
      status: success
      field_checks:
        - key: count
          type: int
          value: 0
