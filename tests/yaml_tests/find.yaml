name: find
description: Node find/search tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child2D, node_type: Node2D }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child3D, node_type: Node3D }
  - tool: add_node_to_group
    args: { node_path: "TestRoot/Child2D", group: test_group }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: find_nodes_by_name
    description: Find nodes by name pattern
    args: { pattern: Child, root: "TestRoot" }
    expect:
      status: success
      has_keys: [matches, count]
      field_checks:
        - key: matches
          type: list
        - key: count
          type: int

  - tool: find_nodes_by_name
    description: Find nonexistent node name
    args: { pattern: NonexistentXYZ, root: "TestRoot" }
    expect:
      status: success
      field_checks:
        - key: count
          type: int

  - tool: find_nodes_by_type
    description: Find nodes by type
    args: { node_class: "Node2D", root: "TestRoot" }
    expect:
      status: success
      has_keys: [matches, count]
      field_checks:
        - key: count
          type: int

  - tool: find_nodes_by_type
    description: Missing type returns error
    args: { root: "TestRoot" }
    expect:
      status: error
      has_keys: [error]

  - tool: find_nodes_by_group
    description: Find nodes by group
    args: { group: test_group, root: "TestRoot" }
    expect:
      status: success
      has_keys: [matches, count]
      field_checks:
        - key: count
          type: int

  - tool: find_nodes_by_group
    description: Find nodes in nonexistent group
    args: { group: nonexistent_group_xyz, root: "TestRoot" }
    expect:
      status: success
      field_checks:
        - key: count
          type: int
          value: 0

  - tool: find_nodes_by_script
    description: Find nodes by script
    args: { script_path: "res://test_mcp_script.gd", root: "TestRoot" }
    expect:
      status: success
      has_keys: [matches, count]
      field_checks:
        - key: count
          type: int
