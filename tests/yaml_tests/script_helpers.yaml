name: script_helpers
description: Script utility tools (validate)

before_all:
  - tool: create_gdscript
    args: { path: res://test_mcp_validate.gd }
  - tool: edit_gdscript
    args: { path: res://test_mcp_validate.gd, source: "extends Node\nfunc _ready():\n\tpass\n" }

tests:
  - tool: validate_gdscript
    description: Validate a valid GDScript
    args: { path: res://test_mcp_validate.gd }
    expect:
      status: success
      has_keys: [path, ok]
      field_checks:
        - key: ok
          type: bool

  - tool: validate_gdscript
    description: Validate nonexistent script returns error
    args: { path: res://nonexistent_xyz.gd }
    expect:
      status: error
      has_keys: [error]
