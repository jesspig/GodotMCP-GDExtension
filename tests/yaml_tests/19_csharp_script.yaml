name: csharp_script_smoke
description: C# script tools (needs .NET SDK)
headless: true

pipeline:
  on_failure: fail_fast
  before_all:
    - tool: create_directory
      args: { path: "res://test_mcp_19" }
    - tool: write_csharp_script
      args:
        path: "res://test_mcp_19/test.cs"
        content: "using Godot;\npublic partial class Test : Node {\n  public override void _Ready() { }\n}"
  after_all:
    - tool: new_scene
      args: { root_type: "Node", root_name: "Cleanup" }
    - tool: delete_file
      args: { path: "res://test_mcp_19", recursive: true }
  stages:
    - id: main
      steps:
        - id: list_csharp_scripts
          tool: list_csharp_scripts
          description: Lists C# scripts
          args: {}
          expect: { status: success }
        - id: read_csharp_script
          tool: read_csharp_script
          description: Reads the C# script
          args: { path: "res://test_mcp_19/test.cs" }
          expect: { status: success }
        - id: validate_csharp_script
          tool: validate_csharp_script
          description: Validates the C# script
          args: { path: "res://test_mcp_19/test.cs" }
          expect: { status: success }
        - id: patch_csharp_script
          tool: patch_csharp_script
          description: Patches the C# script
          args: { path: "res://test_mcp_19/test.cs", old_text: "class Test", new_text: "class Test2" }
          expect: { status: success }
