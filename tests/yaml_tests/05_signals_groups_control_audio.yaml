name: signals_groups_control_audio_smoke
description: Smoke tests for signal, group, control, and audio tools

before_all:
  - tool: new_scene
    args:
      root_type: "Node2D"
      root_name: "TestRoot"
  - tool: add_node
    args:
      class_name: "Sprite2D"
      node_name: "TestSprite"
      parent_path: ""
  - tool: add_node
    args:
      class_name: "Button"
      node_name: "TestButton"
      parent_path: ""

tests:
  - tool: list_signals
    description: Lists available signals on TestSprite
    args:
      node_path: "TestRoot/TestSprite"
    expect:
      has_keys: [node, signals, count]

  - tool: get_signal_connections
    description: Gets signal connections on TestSprite (should be empty)
    args:
      node_path: "TestRoot/TestSprite"
    expect:
      has_keys: [node, connections, count]

  - tool: connect_signal
    description: Connects TestSprite.tree_entered to TestButton.test_method via Callable
    args:
      node_path: "TestRoot/TestSprite"
      signal_name: "tree_entered"
      target_path: "TestRoot/TestButton"
      target_method: "set_text"
    expect:
      has_keys: [node, signal, target, target_method]

  - tool: disconnect_signal
    description: Disconnects the previously connected signal
    args:
      node_path: "TestRoot/TestSprite"
      signal_name: "tree_entered"
      target_path: "TestRoot/TestButton"
      target_method: "set_text"
    expect:
      has_keys: [node, signal, target, target_method]

  - tool: add_to_group
    description: Adds TestSprite to test_group
    args:
      node_path: "TestRoot/TestSprite"
      group_name: "smoke_test_group"
    expect:
      has_keys: [node, group]
      field_checks:
        - key: group
          value: "smoke_test_group"

  - tool: get_node_groups
    description: Lists groups for TestSprite
    args:
      node_path: "TestRoot/TestSprite"
    expect:
      has_keys: [node, groups, count]
      field_checks:
        - key: count
          not_empty: true

  - tool: get_nodes_in_group
    description: Gets all nodes in smoke_test_group
    args:
      group_name: "smoke_test_group"
    expect:
      has_keys: [group, nodes, count]
      field_checks:
        - key: count
          not_empty: true

  - tool: remove_from_group
    description: Removes TestSprite from test_group
    args:
      node_path: "TestRoot/TestSprite"
      group_name: "smoke_test_group"
    expect:
      has_keys: [node, group]
      field_checks:
        - key: group
          value: "smoke_test_group"

  - tool: create_control
    description: Creates a Button control node
    args:
      class_name: "Button"
      node_name: "TestControlBtn"
      parent_path: ""
    expect:
      has_keys: [node_name, node_path, class_name]
      field_checks:
        - key: class_name
          value: "Button"

  - tool: set_layout_preset
    description: Sets layout preset on the control
    args:
      node_path: "TestRoot/TestControlBtn"
      preset: "center"
    expect:
      has_keys: [preset, keep_offsets]

  - tool: set_theme_override
    description: Sets a theme override on the control
    args:
      node_path: "TestRoot/TestControlBtn"
      overrides:
        - type: "color"
          name: "font_color"
          value: "#ff0000"
    expect:
      has_keys: [overrides_applied]

  - tool: create_audio_player
    description: Creates an AudioStreamPlayer2D node
    args:
      node_name: "TestAudio"
      player_type: "2d"
      parent_path: ""
    expect:
      has_keys: [node_name, node_path, player_type, class_name, stream_loaded, bus]
      field_checks:
        - key: class_name
          value: "AudioStreamPlayer2D"

  - tool: list_audio_buses
    description: Lists available audio buses
    expect:
      has_keys: [buses, bus_count]

after_all:
  - tool: new_scene
    args:
      root_type: "Node"
      root_name: "Cleanup"
