name: scene
description: Scene CRUD tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }

after_all:
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: get_open_scenes
    description: List open scenes
    args: {}
    expect:
      status: success
      has_keys: [scenes]
      field_checks:
        - key: scenes
          type: list

  - tool: get_open_scene_roots
    description: Get open scene root nodes
    args: {}
    expect:
      status: success
      field_checks:
        - key: roots
          type: list

  - tool: is_scene_dirty
    description: Check if scene is dirty
    args: {}
    expect:
      status: success
      has_keys: [dirty]
      field_checks:
        - key: dirty
          type: bool

  - tool: mark_scene_unsaved
    description: Mark scene as unsaved
    args: {}
    expect:
      status: success
      has_keys: [marked]

  - tool: save_scene
    description: Save current scene
    args: {}
    expect:
      status: success
      has_keys: [saved]

  - tool: save_scene_as
    description: Save scene to specific path
    args: { scene_path: res://test_mcp_scene_copy.tscn }
    expect:
      status: success
      has_keys: [saved]

  - tool: save_all_scenes
    description: Save all open scenes
    args: {}
    expect:
      status: success
      has_keys: [count]

  - tool: reload_scene
    description: Reload the scene from disk
    args: { scene_path: res://test_mcp_scene.tscn }
    expect:
      status: success
      has_keys: [reloaded]

  - tool: close_scene
    description: Close the copy scene
    args: {}
    expect:
      status: success
      has_keys: [closed]

  - tool: open_scene
    description: Re-open the test scene
    args: { scene_path: res://test_mcp_scene.tscn }
    expect:
      status: success
      has_keys: [opened]

  - tool: create_scene
    description: Create a new empty scene
    args: { path: res://test_mcp_new.tscn, root_name: NewSceneRoot, root_type: Node }
    expect:
      status: success
      has_keys: [path, created, root_type, root_name]
      field_checks:
        - key: path
          type: string
          not_empty: true
        - key: root_name
          value: NewSceneRoot
        - key: root_type
          value: Node

  - tool: delete_scene
    description: Delete the new scene file
    args: { path: res://test_mcp_new.tscn }
    expect:
      status: success
      has_keys: [deleted]

  - tool: delete_scene
    description: Delete nonexistent scene returns error
    args: { path: res://nonexistent_xyz.tscn }
    expect:
      status: error
      has_keys: [error]
