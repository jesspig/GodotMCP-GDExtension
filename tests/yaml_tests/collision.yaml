name: collision
description: Collision shape tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: CollisionTestNode, node_type: Node2D }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: add_rectangle_collision
    description: Add rectangle collision to Node2D
    args: { node_path: "TestRoot/CollisionTestNode", width: 64, height: 32 }
    expect:
      status: success
      has_keys: [node_path, shape, mode]
      field_checks:
        - key: shape
          type: string
        - key: node_path
          not_empty: true

  - tool: add_rectangle_collision
    description: Add rectangle collision with custom position
    args: { node_path: "TestRoot/CollisionTestNode", width: 128, height: 64, position: { x: 10, y: 20 } }
    expect:
      status: success
      field_checks:
        - key: node_path
          not_empty: true

  - tool: add_rectangle_collision
    description: Nonexistent node returns error
    args: { node_path: "TestRoot/NonexistentNodeXYZ", width: 10, height: 10 }
    expect:
      status: error
      has_keys: [error]

  - tool: add_circle_collision
    description: Add circle collision to Node2D
    args: { node_path: "TestRoot/CollisionTestNode", radius: 30 }
    expect:
      status: success
      has_keys: [node_path, shape, mode]
      field_checks:
        - key: shape
          type: string
        - key: node_path
          not_empty: true

  - tool: add_circle_collision
    description: Add circle collision with position
    args: { node_path: "TestRoot/CollisionTestNode", radius: 20, position: { x: 5, y: 10 } }
    expect:
      status: success

  - tool: add_circle_collision
    description: Missing node_path returns error
    args: {}
    expect:
      status: error
      has_keys: [error]
