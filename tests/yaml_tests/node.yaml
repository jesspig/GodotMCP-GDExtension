name: node
description: Node manipulation tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child2D, node_type: Node2D }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child3D, node_type: Node3D }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: get_scene_tree
    description: Get the full scene tree
    args: {}
    expect:
      status: success
      has_keys: [name, type, children, child_count]

  - tool: get_node_path
    description: Get path to root node
    args: { node_path: "." }
    expect:
      status: success
      has_keys: [path]
      field_checks:
        - key: path
          type: string
          not_empty: true

  - tool: get_node_path
    description: Get path from root name
    args: { node_path: "TestRoot" }
    expect:
      status: success
      field_checks:
        - key: path
          not_empty: true

  - tool: get_node_info
    description: Get info about root node
    args: { node_path: "TestRoot" }
    expect:
      status: success
      has_keys: [name, type, child_count, groups]
      field_checks:
        - key: name
          type: string
          not_empty: true
        - key: type
          type: string
        - key: child_count
          type: int

  - tool: get_node_info
    description: Get info about child node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      field_checks:
        - key: name
          not_empty: true
        - key: type
          not_empty: true

  - tool: get_node_info
    description: Nonexistent node returns error
    args: { node_path: "TestRoot/NonexistentXYZ" }
    expect:
      status: error
      has_keys: [error]

  - tool: get_node_info
    description: Missing node_path returns error
    args: {}
    expect:
      status: error
      has_keys: [error]

  - tool: get_property
    description: Get a property value
    args: { node_path: "TestRoot/Child2D", property: "position" }
    expect:
      status: success
      has_keys: [value]

  - tool: get_property
    description: Missing property param returns error
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: error
      has_keys: [error]

  - tool: get_property_list
    description: Get all properties for a node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      has_keys: [properties]
      field_checks:
        - key: properties
          type: list

  - tool: set_property
    description: Set a property on a node
    args: { node_path: "TestRoot/Child2D", property: "position", value: { x: 100, y: 200 } }
    expect:
      status: success
      has_keys: [node_path, property, value]

  - tool: set_property
    description: Nonexistent node returns error
    args: { node_path: "TestRoot/Nonexistent", property: "position", value: { x: 0, y: 0 } }
    expect:
      status: error
      has_keys: [error]

  - tool: add_node_to_group
    description: Add node to a group
    args: { node_path: "TestRoot/Child2D", group: "test_group_yt" }
    expect:
      status: success

  - tool: remove_node_from_group
    description: Remove node from a group
    args: { node_path: "TestRoot/Child2D", group: "test_group_yt" }
    expect:
      status: success

  - tool: rename_node
    description: Rename a node
    args: { node_path: "TestRoot/Child2D", new_name: "Renamed2D" }
    expect:
      status: success
      field_checks:
        - key: new_path
          not_empty: true

  - tool: rename_node
    description: Rename back to original
    args: { node_path: "TestRoot/Renamed2D", new_name: "Child2D" }
    expect:
      status: success

  - tool: move_node
    description: Reparent a node to a different parent
    args: { node_path: "TestRoot/Child3D", new_parent_path: "TestRoot/Child2D" }
    expect:
      status: success
      field_checks:
        - key: new_path
          not_empty: true

  - tool: move_node
    description: Move node back to root
    args: { node_path: "TestRoot/Child2D/Child3D", new_parent_path: "TestRoot" }
    expect:
      status: success

  - tool: duplicate_node
    description: Duplicate a node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      field_checks:
        - key: new_path
          not_empty: true

  - tool: delete_node
    description: Delete the original node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      field_checks:
        - key: deleted
          type: bool

  - tool: create_node
    description: Create a child node
    args: { parent_path: "TestRoot", name: "NewChild", node_type: "Node2D" }
    expect:
      status: success
      has_keys: [path]

  - tool: create_node
    description: Create node at root level
    args: { name: "Orphan", node_type: "Node" }
    expect:
      status: success
      has_keys: [path]

  - tool: set_as_root
    description: Set a child as root
    args: { node_path: "TestRoot/NewChild" }
    expect:
      status: success
      has_keys: [root]

  - tool: reset_parent
    description: Reset the node to root parent
    args: { node_path: "NewChild" }
    expect:
      status: success
