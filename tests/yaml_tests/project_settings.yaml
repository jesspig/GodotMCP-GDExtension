name: project_settings
description: Project settings read/write tools

tests:
  - tool: get_project_setting
    description: Get string setting by property name
    args: { property: application/config/name }
    expect:
      status: success
      has_keys: [property, value]
      field_checks:
        - key: property
          type: string
          value: application/config/name
        - key: value
          type: any

  - tool: get_project_setting
    description: Get integer setting
    args: { property: display/window/size/viewport_width }
    expect:
      status: success
      field_checks:
        - key: property
          value: display/window/size/viewport_width

  - tool: get_project_setting
    description: Missing property returns error
    args: {}
    expect:
      status: error
      has_keys: [error]
      error_contains: property

  - tool: get_project_setting
    description: Empty property returns error
    args: { property: "" }
    expect:
      status: error
      has_keys: [error]

  - tool: set_project_setting
    description: Set string project setting value
    args: { property: application/config/name, value: GodotMCP_Test }
    expect:
      status: success
      has_keys: [property, value]
      field_checks:
        - key: property
          value: application/config/name

  - tool: set_project_setting
    description: Set integer project setting
    args: { property: display/window/size/viewport_width, value: 1152 }
    expect:
      status: success
      field_checks:
        - key: property
          value: display/window/size/viewport_width

  - tool: set_project_setting
    description: Missing value returns error
    args: { property: application/config/name }
    expect:
      status: error
      has_keys: [error]

  - tool: set_project_setting
    description: Restore project name
    args: { property: application/config/name, value: GodotMCP }
    expect:
      status: success

  - tool: set_project_setting
    description: Restore viewport width
    args: { property: display/window/size/viewport_width, value: 1152 }
    expect:
      status: success

  - tool: set_main_scene
    description: Set main scene
    args: { scene_path: res://test_main.tscn }
    expect:
      status: success
      field_checks:
        - key: main_scene
          value: res://test_main.tscn

  - tool: set_main_scene
    description: Missing scene_path returns error
    args: {}
    expect:
      status: error
      has_keys: [error]

  - tool: list_scenes
    description: List all scene files in project
    args: {}
    expect:
      status: success
      has_keys: [scenes, count]
      field_checks:
        - key: scenes
          type: list
        - key: count
          type: int

  - tool: list_scenes
    description: List scenes with custom root and max results
    args: { root: res://, max_results: 5 }
    expect:
      status: success
      field_checks:
        - key: scenes
          type: list

  - tool: list_autoloads
    description: List autoloads
    args: {}
    expect:
      status: success
      has_keys: [autoloads, count]
      field_checks:
        - key: autoloads
          type: list
        - key: count
          type: int
