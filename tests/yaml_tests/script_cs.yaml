name: script_cs
description: C# script tools (requires .NET SDK)

tests:
  - tool: csharp_create_solution
    description: Create .csproj and .sln files
    args: {}
    expect:
      status: success
      has_keys: [success, project_name, csproj, sln, guid]
      field_checks:
        - key: success
          type: bool
        - key: csproj
          type: string
          not_empty: true
        - key: sln
          type: string
          not_empty: true
    skip_if_missing: false

  - tool: list_csharp_scripts
    description: List C# scripts
    args: {}
    expect:
      status: success
      has_keys: [scripts, count]
      field_checks:
        - key: scripts
          type: list
        - key: count
          type: int

  - tool: create_csharp_script
    description: Create a C# script file
    args: { path: res://TestMcpScript.cs }
    expect:
      status: success
      has_keys: [path, created, class_name, language]
      field_checks:
        - key: path
          value: res://TestMcpScript.cs
        - key: created
          type: bool
        - key: language
          value: csharp

  - tool: create_csharp_script
    description: Create C# script with custom base class
    args: { path: res://TestMcpNode2D.cs, base_class: Node2D }
    expect:
      status: success
      field_checks:
        - key: class_name
          value: TestMcpNode2D

  - tool: create_csharp_script
    description: Duplicate without overwrite returns error
    args: { path: res://TestMcpScript.cs }
    expect:
      status: error
      has_keys: [error]

  - tool: read_csharp_script
    description: Read C# script file
    args: { path: res://TestMcpScript.cs }
    expect:
      status: success
      has_keys: [path, source, length, language]
      field_checks:
        - key: path
          value: res://TestMcpScript.cs
        - key: source
          type: string
          not_empty: true
        - key: language
          value: csharp

  - tool: read_csharp_script
    description: Read nonexistent C# file returns error
    args: { path: res://NonexistentXYZ.cs }
    expect:
      status: error
      has_keys: [error]

  - tool: edit_csharp_script
    description: Edit C# script file content
    args: { path: res://TestMcpScript.cs, source: "using Godot;\npublic partial class TestMcpScript : Node { }" }
    expect:
      status: success
      has_keys: [path, bytes, updated_file, language]
      field_checks:
        - key: path
          value: res://TestMcpScript.cs
        - key: updated_file
          type: bool

  - tool: edit_csharp_script
    description: Missing source returns error
    args: { path: res://TestMcpScript.cs }
    expect:
      status: error
      has_keys: [error]

  - tool: csharp_build
    description: Build C# project
    args: { configuration: Debug }
    expect:
      status: success
      has_keys: [project_root, configuration, exit_code]
      field_checks:
        - key: configuration
          value: Debug
    skip_if_missing: false
