name: undo
description: Undo/redo tools

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child2D, node_type: Node2D }
  - tool: set_property
    args: { node_path: "TestRoot/Child2D", property: "position", value: { x: 100, y: 200 } }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: undo
    description: Perform undo operation
    args: {}
    expect:
      status: success
      has_keys: [undo_applied]
      field_checks:
        - key: undo_applied
          type: bool

  - tool: undo
    description: Undo again (redo-able action)
    args: {}
    expect:
      status: success

  - tool: redo
    description: Redo the last undone action
    args: {}
    expect:
      status: success
      has_keys: [redo_applied]
      field_checks:
        - key: redo_applied
          type: bool
