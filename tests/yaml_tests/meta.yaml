name: meta
description: Meta/always-on tools for progressive disclosure

tests:
  - tool: godot_info
    description: Get Godot connection info
    args: {}
    expect:
      status: success
      has_keys: [connection, engine, plugin, project, editor]
      field_checks:
        - key: connection
          type: dict
        - path: connection.status
          type: string
        - key: engine
          type: dict
        - path: engine.version
          type: string
          not_empty: true
        - key: plugin
          type: dict
        - path: plugin.version
          type: string
          not_empty: true

  - tool: list_tool_categories
    description: List all tool categories
    args: {}
    expect:
      status: success
      field_checks:
        - key: categories
          type: list
          not_empty: true

  - tool: list_tools
    description: List tools in meta category
    args: { category: "other/meta" }
    expect:
      status: success
      field_checks:
        - key: tools
          type: list
          not_empty: true

  - tool: list_tools
    description: List tools in empty category returns empty array
    args: { category: nonexistent_category_xyz }
    expect:
      status: success
      field_checks:
        - key: tools
          type: list

  - tool: get_tool_schema
    description: Get schema for a known tool
    args: { tool_name: godot_info }
    expect:
      status: success
      has_keys: [name, input_schema]

  - tool: get_tool_schema
    description: Get schema for nonexistent tool returns error
    args: { tool_name: nonexistent_tool_xyz }
    expect:
      status: error
      has_keys: [error]

  - tool: call_tool
    description: Call godot_info via call_tool (fallback mechanism)
    args: { tool_name: godot_info }
    expect:
      status: success
