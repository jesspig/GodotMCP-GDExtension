name: script_gd
description: GDScript tools (read-only + create/edit)

before_all:
  - tool: create_scene
    args: { path: res://test_mcp_scene.tscn, root_name: TestRoot, root_type: Node }
  - tool: open_scene
    args: { scene_path: res://test_mcp_scene.tscn }
  - tool: create_node
    args: { parent_path: TestRoot, name: Child2D, node_type: Node2D }
  - tool: create_gdscript
    args: { path: res://test_mcp_script.gd }

after_all:
  - tool: close_scene
    args: {}
  - tool: delete_scene
    args: { path: res://test_mcp_scene.tscn }

tests:
  - tool: list_gdscripts
    description: List GDScript files
    args: {}
    expect:
      status: success
      has_keys: [scripts, count]
      field_checks:
        - key: scripts
          type: list
        - key: count
          type: int

  - tool: list_gdscripts
    description: List GDScripts with custom root
    args: { root: res://, include_addons: false }
    expect:
      status: success
      field_checks:
        - key: scripts
          type: list

  - tool: read_gdscript
    description: Read a GDScript file
    args: { path: res://test_mcp_script.gd }
    expect:
      status: success
      has_keys: [path, source, length]
      field_checks:
        - key: path
          value: res://test_mcp_script.gd
        - key: source
          type: string
          not_empty: true
        - key: length
          type: int

  - tool: create_gdscript
    description: Create with custom base class
    args: { path: res://test_mcp_script2.gd, base_class: "Node2D", overwrite: true }
    expect:
      status: success

  - tool: create_gdscript
    description: Overwrite existing file
    args: { path: res://test_mcp_script.gd, overwrite: true }
    expect:
      status: success
      field_checks:
        - key: path
          value: res://test_mcp_script.gd

  - tool: create_gdscript
    description: Duplicate without overwrite returns error
    args: { path: res://test_mcp_script.gd }
    expect:
      status: error
      has_keys: [error]
      error_contains: exists

  - tool: edit_gdscript
    description: Edit an existing GDScript file
    args: { path: res://test_mcp_script.gd, source: "extends RefCounted\n\nvar test_var = 42\n\nfunc test():\n\tpass\n" }
    expect:
      status: success
      has_keys: [path, bytes]
      field_checks:
        - key: path
          value: res://test_mcp_script.gd

  - tool: attach_script
    description: Attach script to a node
    args: { node_path: "TestRoot/Child2D", script_path: "res://test_mcp_script.gd" }
    expect:
      status: success
      has_keys: [node_path, script_path]
      field_checks:
        - key: node_path
          not_empty: true

  - tool: get_script_variables
    description: Get script variables for a node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      has_keys: [node_path, variables]

  - tool: detach_script
    description: Detach script from a node
    args: { node_path: "TestRoot/Child2D" }
    expect:
      status: success
      has_keys: [node_path]
      field_checks:
        - key: node_path
          not_empty: true

  - tool: read_gdscript
    description: Read nonexistent file returns error
    args: { path: res://nonexistent_xyz.gd }
    expect:
      status: error
      has_keys: [error]
