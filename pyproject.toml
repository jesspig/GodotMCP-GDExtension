[tool.ruff]
line-length = 88
select = ["E", "W", "F", "I", "B", "C", "N"]
ignore = [
    "E501",
    "B008",
]
target-version = "py313"
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    ".git",
    "target",
    "build",
]

[tool.ruff.lint]
fixable = ["A", "B", "C", "E", "F", "I", "N", "W"]
fix = false

[tool.mypy]
python_version = "3.13"
strict = true
show_error_codes = true
ignore_missing_imports = true
follow_imports = "silent"
